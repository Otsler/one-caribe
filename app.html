<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="One.ico">

<link rel="stylesheet" href="estilos.css">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e293b">

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body onload="initApp()">

<div class="navbar">
<button class="menu-btn" onclick="toggleMenu()">☰</button>
<div><b>ONE CARIBE</b></div>
<div id="userInfo"></div>
<div onclick="logout()" style="cursor:pointer;">Cerrar sesión</div>
</div>

<div class="sidebar" id="sidebar">
<a onclick="mostrar('entradas')">📥 Entradas</a>
<a onclick="mostrar('salidas')">📤 Salidas</a>
<a onclick="mostrar('inventario')">📦 Inventario</a>
<a onclick="mostrar('config')">⚙️ Config</a>
<a onclick="mostrar('usuarios')">👥 Usuarios</a>
</div>

<div class="content">
<div class="card">

<div id="entradas" class="vista">
<h3>Entradas</h3>
<select id="productoE"></select>
<select id="referenciaE"></select>
<input id="pacasE" type="number">
<button onclick="entrada()">Guardar</button>
<table><tbody id="tablaEntradas"></tbody></table>
</div>

<div id="salidas" class="vista" style="display:none;">
<h3>Salidas</h3>
<select id="productoS"></select>
<select id="referenciaS"></select>
<input id="pacasS" type="number">
<button onclick="salida()">Guardar</button>
<table><tbody id="tablaSalidas"></tbody></table>
</div>

<div id="inventario" class="vista" style="display:none;">
<h3>Inventario</h3>
<button onclick="descargarInventario()">📥 Descargar</button>
<button onclick="imprimirInventario()">🖨 Imprimir</button>
<table><tbody id="tablaInventario"></tbody></table>
<div id="totales"></div>
</div>

<div id="config" class="vista" style="display:none;">
<h3>Config</h3>
<table><tbody id="tablaConfig"></tbody></table>
<input id="claveAdmin" type="password">
<button onclick="limpiar('entradas')">Limpiar</button>
</div>

<div id="usuarios" class="vista" style="display:none;">
<h3>Usuarios</h3>
<input id="userN">
<input id="passN">
<select id="rolN">
<option>Admin</option>
<option>Supervisor</option>
<option>Operador</option>
</select>
<button onclick="crearUsuario()">Crear</button>
<table><tbody id="tablaUsuarios"></tbody></table>
</div>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSy...",
authDomain: "one-caribe.firebaseapp.com",
projectId: "one-caribe"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<script src="data.js"></script>
<script src="app.js"></script>

<script>
function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active");
}
</script>

</body>
</html>
