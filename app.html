<!DOCTYPE html>
<html>
<link rel="One" href="One.ico">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- ✅ CSS CORRECTO (FORZANDO CARGA) -->
<link rel="stylesheet" href="./estilos.css?v=2">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e293b">

<!-- LIBRERÍAS -->
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body onload="initApp()">

<!-- NAVBAR -->
<div class="navbar">

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div><b>ONE CARIBE</b></div>

<div id="userInfo"></div>

<div onclick="logout()" style="cursor:pointer;">Cerrar sesión</div>

</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<a onclick="mostrar('entradas')">📥 Entradas</a>
<a onclick="mostrar('salidas')">📤 Salidas</a>
<a onclick="mostrar('inventario')">📦 Inventario</a>
<a onclick="mostrar('config')">⚙️ Config</a>
<a onclick="mostrar('usuarios')">👥 Usuarios</a>
</div>

<!-- CONTENT -->
<div class="content">
<div class="card">

<!-- ENTRADAS -->
<div id="entradas" class="vista">
<h3>Entradas</h3>

<select id="productoE"></select>
<select id="referenciaE"></select>
<input id="pacasE" type="number" placeholder="Cantidad">

<button onclick="entrada()">Guardar</button>

<table>
<thead>
<tr><th>Fecha</th><th>Producto</th><th>Referencia</th><th>Pacas</th><th>Usuario</th></tr>
</thead>
<tbody id="tablaEntradas"></tbody>
</table>
</div>

<!-- SALIDAS -->
<div id="salidas" class="vista" style="display:none;">
<h3>Salidas</h3>

<select id="productoS"></select>
<select id="referenciaS"></select>
<input id="pacasS" type="number" placeholder="Cantidad">

<button onclick="salida()">Guardar</button>

<table>
<thead>
<tr><th>Fecha</th><th>Producto</th><th>Referencia</th><th>Pacas</th><th>Usuario</th></tr>
</thead>
<tbody id="tablaSalidas"></tbody>
</table>
</div>

<!-- INVENTARIO -->
<div id="inventario" class="vista" style="display:none;">
<h3>Inventario</h3>

<button onclick="descargarInventario()">📥 Descargar</button>
<button onclick="imprimirInventario()">🖨 Imprimir</button>

<table>
<thead>
<tr>
<th>Producto</th>
<th>Referencia</th>
<th>Pacas</th>
<th>Estibas</th>
</tr>
</thead>
<tbody id="tablaInventario"></tbody>
</table>
</div>

<!-- CONFIG -->
<div id="config" class="vista" style="display:none;">
<h3>Config Estibas</h3>
<table><tbody id="tablaConfig"></tbody></table>

<input id="claveAdmin" placeholder="Clave admin" type="password">

<button onclick="limpiar('entradas')">🗑 Entradas</button>
<button onclick="limpiar('salidas')">🗑 Salidas</button>
<button onclick="limpiar('inventario')">🗑 Inventario</button>
</div>

<!-- USUARIOS -->
<div id="usuarios" class="vista" style="display:none;">
<h3>Usuarios</h3>

<input id="userN" placeholder="Usuario">
<input id="passN" placeholder="Clave">

<select id="rolN">
<option>Admin</option>
<option>Supervisor</option>
<option>Operador</option>
</select>

<button onclick="crearUsuario()">Crear</button>

<table>
<thead>
<tr><th>Usuario</th><th>Clave</th><th>Rol</th><th></th></tr>
</thead>
<tbody id="tablaUsuarios"></tbody>
</table>
</div>

</div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSy...",
authDomain: "one-caribe.firebaseapp.com",
projectId: "one-caribe"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<script src="data.js"></script>
<script src="app.js"></script>

<!-- MENU MOBILE -->
<script>
function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active");
}
</script>

</body>
</html>
