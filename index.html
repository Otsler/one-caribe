<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="One.ico">

<style>
body{
font-family:Arial;
background:#1e293b;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
.box{
background:white;
padding:30px;
border-radius:10px;
width:300px;
}
input{
width:100%;
padding:10px;
margin:10px 0;
}
button{
width:100%;
padding:10px;
background:#2563eb;
color:white;
border:none;
}
</style>
</head>

<body>

<div class="box">
<h2>ONE CARIBE</h2>

<input id="usuario" placeholder="Usuario">
<input id="clave" type="password" placeholder="Clave">

<button onclick="login()">Ingresar</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSy...",
authDomain: "one-caribe.firebaseapp.com",
projectId: "one-caribe"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔥 LOGIN
async function login(){

let u = usuario.value.trim();
let c = clave.value.trim();

if(!u || !c){
alert("Ingrese datos");
return;
}

let btn = document.querySelector("button");
btn.disabled = true;
btn.innerText = "Ingresando...";

try{

// 🔥 BUSCAR EN SUCURSALES
let sucursales = ["Barranquilla","Galapa"];

for(let s of sucursales){

let snap = await db.collection("sucursales")
.doc(s)
.collection("usuarios")
.where("usuario","==",u)
.where("clave","==",c)
.get();

if(!snap.empty){

let user = snap.docs[0].data();

localStorage.setItem("usuario", u);
localStorage.setItem("rol", user.rol);
localStorage.setItem("sucursal", s);
localStorage.setItem("permisos", JSON.stringify(user.permisos || {}));

window.location.href="app.html";
return;
}
}

// 🔥 BUSCAR EN SISTEMA ANTIGUO
let oldSnap = await db.collection("usuarios")
.where("usuario","==",u)
.where("clave","==",c)
.get();

if(!oldSnap.empty){

let user = oldSnap.docs[0].data();

localStorage.setItem("usuario", u);
localStorage.setItem("rol", user.rol);
localStorage.setItem("sucursal", "Barranquilla");
localStorage.setItem("permisos", JSON.stringify(user.permisos || {}));

window.location.href="app.html";
return;
}

alert("❌ Credenciales incorrectas");

}catch(e){
console.error(e);
alert("Error de conexión");
}

btn.disabled=false;
btn.innerText="Ingresar";
}
</script>

</body>
</html>
